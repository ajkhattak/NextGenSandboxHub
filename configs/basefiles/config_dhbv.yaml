# dHBV requires a trained model directory.
# Recommended practice is to copy dHBV trained data under:
#   $SANDBOX_DATA/dhbv2/
#
# Set model_dir to the trained model bundle directory.
# If attributes_file is omitted, the workflow defaults to:
#   <model_dir>/dhbv_attrs.parquet
#
# Relative model_dir paths are resolved first under:
#   $SANDBOX_DATA/dhbv2/
# and then fall back to:
#   $SANDBOX_DIR/extern/dhbv2/

model_dir: dhbv_2_mts/model/dhbv_2_mts
#attributes_file: dhbv_2_mts/model/dhbv_2_mts/dhbv_attrs.parquet

### Single-catchment configuration ###
catchment_id: 'cat-*'
dtype: float32

verbose: false

time_step: 1 hour

static_attributes:
  training:
    aridity: aridity
    meanP: meanP
    ETPOT_Hargr: ETPOT_Hargr
    NDVI: NDVI
    FW: FW
    meanslope: meanslope
    SoilGrids1km_sand: SoilGrids1km_sand
    SoilGrids1km_clay: SoilGrids1km_clay
    SoilGrids1km_silt: SoilGrids1km_silt
    glaciers: glaciers
    HWSD_clay: HWSD_clay
    HWSD_gravel: HWSD_gravel
    HWSD_sand: HWSD_sand
    HWSD_silt: HWSD_silt
    meanelevation: meanelevation
    meanTa: meanTa
    permafrost: permafrost
    permeability: permeability
    seasonality_P: seasonality_P
    seasonality_PET: seasonality_PET
    snow_fraction: snow_fraction
    snowfall_fraction: snowfall_fraction
    T_clay: T_clay
    T_gravel: T_gravel
    T_sand: T_sand
    T_silt: T_silt
    Porosity: Porosity
    uparea: uparea
    catchsize: catchsize
    lengthkm: lengthkm


