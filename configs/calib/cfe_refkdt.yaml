refkdt:

  dataset: USGS_LULC
  parameter: refkdt
  description: >
    Vegetation-dependent surface infiltration partitioning parameter
    grouped by USGS land cover classification.

  classes:

    - usgs_id: 1
      name: Urban and Built-Up Land
      min: 0.5
      max: 1.5
      init: 1.0

    - usgs_id: 2
      name: Dryland Cropland and Pasture
      min: 2.5
      max: 3.5
      init: 3.0

    - usgs_id: 3
      name: Irrigated Cropland
      min: 3.0
      max: 4.0
      init: 3.2

    - usgs_id: 4
      name: Mixed Cropland
      min: 2.5
      max: 3.5
      init: 3.0

    - usgs_id: 5
      name: Cropland/Grassland Mosaic
      min: 2.5
      max: 3.5
      init: 3.0

    - usgs_id: 6
      name: Cropland/Woodland Mosaic
      min: 3.5
      max: 5.0
      init: 4.0

    - usgs_id: 7
      name: Grassland
      min: 2.5
      max: 3.5
      init: 3.0

    - usgs_id: 8
      name: Shrubland
      min: 3.0
      max: 4.5
      init: 3.8

    - usgs_id: 9
      name: Mixed Shrub/Grass
      min: 3.0
      max: 4.0
      init: 3.5

    - usgs_id: 10
      name: Savanna
      min: 3.5
      max: 5.0
      init: 4.2

    - usgs_id: 11
      name: Deciduous Broadleaf Forest
      min: 4.0
      max: 6.0
      init: 5.0

    - usgs_id: 12
      name: Deciduous Needleleaf Forest
      min: 4.0
      max: 6.0
      init: 5.0

    - usgs_id: 13
      name: Evergreen Broadleaf Forest
      min: 4.5
      max: 6.5
      init: 5.5

    - usgs_id: 14
      name: Evergreen Needleleaf Forest
      min: 4.0
      max: 6.0
      init: 5.0

    - usgs_id: 15
      name: Mixed Forest
      min: 4.0
      max: 6.0
      init: 5.0

    - usgs_id: 16
      name: Water Bodies
      min: 0.0
      max: 0.0
      init: 0.0
      note: No infiltration partitioning applied - all water added to runoff

    - usgs_id: 17
      name: Herbaceous Wetland
      min: 5.0
      max: 7.0
      init: 6.0

    - usgs_id: 18
      name: Wooded Wetland
      min: 5.0
      max: 7.0
      init: 6.0

    - usgs_id: 19
      name: Barren or Sparsely Vegetated
      min: 1.5
      max: 2.5
      init: 2.0

    - usgs_id: 20
      name: Herbaceous Tundra
      min: 2.0
      max: 3.0
      init: 2.5

    - usgs_id: 21
      name: Wooded Tundra
      min: 3.5
      max: 5.0
      init: 4.2

    - usgs_id: 22
      name: Mixed Tundra
      min: 2.5
      max: 3.5
      init: 3.0

    - usgs_id: 23
      name: Bare Ground Tundra
      min: 1.0
      max: 2.0
      init: 1.5

    - usgs_id: 24
      name: Snow or Ice
      min: 0.1
      max: 0.5
      init: 0.3

    - usgs_id: 25
      name: Playa
      min: 0.5
      max: 1.5
      init: 1.0

    - usgs_id: 26
      name: Lava
      min: 0.5
      max: 2.0
      init: 1.2

    - usgs_id: 27
      name: White Sand
      min: 1.0
      max: 2.0
      init: 1.5


